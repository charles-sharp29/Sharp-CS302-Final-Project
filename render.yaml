# ============================================================
# render.yaml — Render Blueprint for the StatEdge Dash app.
# ============================================================
#
# When you connect this repo to Render and choose "Blueprint", Render
# reads this file and provisions everything automatically: a free web
# service running the app via gunicorn, with the OPENAI_API_KEY hooked
# up as a private env var. Pushes to `main` then auto-deploy.

services:
  - type: web
    name: statedge
    runtime: python
    plan: free
    region: oregon
    branch: main
    buildCommand: "pip install -r requirements.txt"
    # `app:server` = the Flask `server` object inside app.py.
    # Render injects $PORT — gunicorn binds to it. One worker is plenty
    # on the free tier (free plans have ~512 MB RAM).
    startCommand: "gunicorn app:server --bind 0.0.0.0:$PORT --workers 1 --timeout 120"
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: OPENAI_API_KEY
        sync: false  # secret — set this in the Render dashboard, never commit it
