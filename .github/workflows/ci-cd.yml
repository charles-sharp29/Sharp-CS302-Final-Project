# ============================================================
# CI / CD — one pipeline that tests, then deploys.
# ============================================================
#
# Triggered on every push to main and every PR targeting main.
#
# Job 1 (test):
#   Boots a fresh Ubuntu VM, installs Python + dependencies, runs pytest.
#   Runs for BOTH push and pull_request events so PRs get a green/red
#   check before they merge.
#
# Job 2 (deploy):
#   Only runs on push to main (NOT on PRs) AND only after `test` is green.
#   Pings Render's deploy hook URL, which makes Render pull the latest
#   commit, rebuild, and redeploy the live app.
#
# Setup required (one-time, see README "Continuous Deployment" section):
#   1. Connect this repo to Render via render.yaml (Blueprint).
#   2. Copy the service's "Deploy Hook" URL from the Render dashboard.
#   3. In GitHub: Settings → Secrets and variables → Actions →
#      "New repository secret" → name: RENDER_DEPLOY_HOOK_URL.

name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run pytest on Ubuntu
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: python -m pytest tests/ -v

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: test                                  # gate on green tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Render deploy hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "::warning::RENDER_DEPLOY_HOOK_URL is not set — skipping deploy."
            echo "Add it under Settings → Secrets and variables → Actions."
            exit 0
          fi
          echo "Pinging Render deploy hook…"
          curl --fail --silent --show-error -X POST "$RENDER_DEPLOY_HOOK_URL"
          echo
          echo "Render is now building & deploying the latest commit."
