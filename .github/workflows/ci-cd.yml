# ============================================================
# CI / CD — one workflow, two clearly separate phases.
# ============================================================
#
# This pipeline runs as a single GitHub Actions "workflow run", but
# it does TWO conceptually different things in two distinct jobs:
#
#   Job 1: ci   (Continuous Integration)
#     - Runs pytest on a fresh Ubuntu VM with Python 3.11.
#     - Answers "is this commit healthy?".
#     - Runs on every push to main and every PR targeting main.
#
#   Job 2: cd   (Continuous Delivery)
#     - Only runs *after* `ci` succeeds (`needs: ci`).
#     - Only runs on actual pushes to main (not PRs), so PR commits
#       don't generate spam release artifacts.
#     - Packages the application source into a versioned zip
#       (`statedge-<sha>.zip`) and uploads it as a downloadable
#       GitHub Actions artifact.
#     - This is *Continuous Delivery*, not Deployment: a human still
#       has to choose to actually push that artifact to a live host.

name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    name: CI — run pytest
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: python -m pytest tests/ -v

  cd:
    name: CD — build release artifact
    runs-on: ubuntu-latest
    needs: ci                                       # only after CI is green
    # Skip CD on pull requests — PRs are about validation, not delivery.
    if: github.event_name != 'pull_request'

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Compute version tag from commit SHA
        id: version
        run: echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Stage release files
        run: |
          mkdir -p release/statedge
          # Copy only what's needed to run the app in production.
          # Dev / test / VCS files are deliberately excluded.
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='venv' \
            --exclude='.venv' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.pytest_cache' \
            --exclude='.coverage' \
            --exclude='htmlcov' \
            --exclude='.env' \
            --exclude='data' \
            --exclude='tests' \
            --exclude='release' \
            ./ release/statedge/

      - name: Create zip
        run: |
          cd release
          zip -r "statedge-${{ steps.version.outputs.tag }}.zip" statedge/

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: statedge-${{ steps.version.outputs.tag }}
          path: release/statedge-${{ steps.version.outputs.tag }}.zip
          if-no-files-found: error
          retention-days: 90
