# ============================================================
# CI / CD — Continuous Integration + Continuous DELIVERY.
# ============================================================
#
# This pipeline implements the standard "test on every push, deploy on
# demand" pattern (Continuous DELIVERY, not Continuous DEPLOYMENT):
#
#   Continuous Integration (CI)
#     - Runs automatically on every push and pull request.
#     - Job: `test` — installs deps, runs pytest.
#     - Result: green ✅ / red ❌ check on every commit.
#
#   Continuous Delivery (CD)
#     - The `release` job is *manually* triggered from the GitHub UI:
#         Repo → Actions tab → "CI / CD" → "Run workflow" (green button).
#     - It re-runs the test suite (so we never ship a broken commit) and
#       then pings the Render deploy hook to push the latest commit live.
#     - A human decides *when* to deploy; the pipeline is what makes that
#       deploy reliable & one-click.
#
# Why this is "Delivery" instead of "Deployment":
#   The artifact (the tested, packaged, push-ready code on `main`) is
#   *always* releasable after CI is green. The actual production
#   deploy is a deliberate human action, not an automatic side-effect
#   of `git push`. This is the pattern most professional teams use.
#
# One-time setup for the manual deploy button:
#   1. Render dashboard → your `statedge` service → Settings → Deploy
#      Hook → copy the URL.
#   2. GitHub repo → Settings → Secrets and variables → Actions →
#      "New repository secret" → name: RENDER_DEPLOY_HOOK_URL.

name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:           # enables the manual "Run workflow" button

jobs:
  test:
    name: Run pytest on Ubuntu
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: python -m pytest tests/ -v

  release:
    name: Release to production
    runs-on: ubuntu-latest
    needs: test                                    # re-runs tests first
    if: github.event_name == 'workflow_dispatch'   # ONLY on manual click

    steps:
      - name: Trigger Render deploy hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "::error::RENDER_DEPLOY_HOOK_URL is not configured."
            echo "Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi
          echo "Pinging Render deploy hook…"
          curl --fail --silent --show-error -X POST "$RENDER_DEPLOY_HOOK_URL"
          echo
          echo "Render is now building & deploying the latest commit."
