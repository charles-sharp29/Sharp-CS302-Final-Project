# ============================================================
# CI — Continuous Integration.
# ============================================================
#
# Runs the full pytest suite on every push and pull request to main.
# This is the *validation* half of the pipeline: nothing here builds
# a release artifact or deploys anywhere — it just answers the
# question "is the code on main still healthy?".
#
# A green run here is the prerequisite for the CD workflow
# (.github/workflows/cd.yml), which is chained via `workflow_run`
# and only fires after CI succeeds.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Run pytest on Ubuntu
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: python -m pytest tests/ -v
